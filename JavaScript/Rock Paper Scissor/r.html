<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="r.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div id="choices">
        <div class="choice" id="rock">
            <img src="https://sihoonathan.github.io/rock-paper-scissors/assets/img/rock2.png" alt="" class="img">
        </div>
        <div class="choice" id="paper">
            <img src="https://www.kindpng.com/picc/m/266-2667881_rock-paper-scissors-images-png-transparent-png.png" alt="" class="img">
        </div>
        <div class="choice" id="scissor">
            <img src="https://i.pinimg.com/564x/67/eb/fd/67ebfd32e898b4ec3ae4e59ae33832c8.jpg" alt="" class="img">
        </div>
    </div>

    <div id="k1">
        <div class="score">
            <p id="k2">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="k3">0</p>
            <p>Comp</p>
        </div>
    </div>

    <button class="button">Play your move</button>
    

    <script src="r.js"></script>
</body>
</html>
